name: Check dependency usage

on:
  pull_request:
    paths:
      - 'pnpm-lock.yaml'

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  check-dependency:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Build
        run: |
          pnpm i --no-frozen-lockfile
      - name: Comment
        run: |
          read -a array <<< "${PR_TITLE}"
          if [ "${array[2]}" == "dependency" ]; then
            node bin/cdxgen.js --exclude test/\*\* -t js --deep
            echo "Output of \`pnpm why ${array[3]}\`:" > _tree.txt
            echo "\`\`\`" >> _tree.txt
            pnpm why ${array[3]} >> _tree.txt
            echo "\`\`\`" >> _tree.txt
            echo "Output of \`jq\` on components:" >> _tree.txt
            echo "\`\`\`" >> _tree.txt
            jq --arg dep "${array[3]}@" '.components[] | select(."bom-ref" | test($dep)) | { group, name, version, purl, licenses }' bom.json >> _tree.txt
            echo "\`\`\`" >> _tree.txt
            echo "Output of \`jq\` on dependencies:" >> _tree.txt
            echo "\`\`\`" >> _tree.txt
            jq --arg dep "${array[3]}@" '.dependencies[] | select(.ref | test($dep))' bom.json >> _tree.txt
            jq --arg dep "${array[3]}@" '.dependencies[] | select(.dependsOn | any(test($dep)))' bom.json >> _tree.txt
            echo "\`\`\`" >> _tree.txt
          fi
        env:
          FETCH_LICENSE: true
          PR_TITLE: ${{ github.event.pull_request.title }}
      - uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0  # v3.11.0
        if: hashFiles('_tree.txt')
        with:
          message-path: _tree.txt

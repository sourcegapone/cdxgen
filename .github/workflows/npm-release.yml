      - name: Trim CI agent
        run: |
          chmod +x contrib/free_disk_space.sh
          ./contrib/free_disk_space.sh
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Fix QEMU
        run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes -c yes
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/cdxgen/cdxgen-bun
      - name: Build and push Docker images
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ci/Dockerfile-bun
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Attach cdx sbom
        run: |
          pnpm install:frozen
          tags="${STEPS_META_OUTPUTS_TAGS}"
          first_tag=$(echo "$tags" | head -n 1)
          node bin/cdxgen.js -t docker -o cdxgen-bun-oci-image.cdx.json "$first_tag"
          node bin/verify.js -i cdxgen-bun-oci-image.cdx.json --public-key contrib/bom-signer/public.key
          for tag in $tags; do
            echo "Processing tag: $tag"
            oras attach --artifact-type sbom/cyclonedx "$tag" ./cdxgen-bun-oci-image.cdx.json:application/json
            oras discover --format tree "$tag"
            node bin/verify.js -i "$tag" --public-key contrib/bom-signer/public.key
          done
        env:
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-sboms
          DOCKER_USE_CLI: true
          SBOM_SIGN_ALGORITHM: RS512
          SBOM_SIGN_PRIVATE_KEY_BASE64: ${{ secrets.SBOM_SIGN_PRIVATE_KEY }}
          STEPS_META_OUTPUTS_TAGS: ${{ steps.meta.outputs.tags }}
      - name: Attach cdx bun sbom to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            cdxgen-bun-oci-image.cdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          file: ci/Dockerfile-ppc64
          platforms: linux/ppc64le
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cdxgen-ppc64
          cache-to: type=gha,mode=max,scope=cdxgen-ppc64
  containers-bun:

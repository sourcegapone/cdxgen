name: Release npm package and container images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  pkg:
    if: github.repository == 'cdxgen/cdxgen'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # needed for npm provenance attestation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org/
          scope: '@cyclonedx'
      - name: Release npm package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          pnpm install:frozen
          NPM_CONFIG_PROVENANCE=true pnpm publish --access=public --no-git-checks
      - name: jsr publish
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          npx jsr publish --allow-dirty
        continue-on-error: true
  containers-ruby-builder-amd64:
    if: github.repository == 'cdxgen/cdxgen'
    runs-on: 'ubuntu-24.04'
    outputs:
      image-uri: ghcr.io/cdxgen/cdxgen-ruby-builder@${{ steps.build.outputs.digest }}
    permissions:
      packages: write  # needed for uploading images to GH package registry
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/cdxgen/cdxgen-ruby-builder
          flavor: latest=false,suffix=-amd64
      - name: Build and push Docker images
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        id: build
        with:
          context: .
          file: ci/images/al10/Dockerfile.ruby-builder
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: cloudposse/github-action-matrix-outputs-write@ed06cf3a6bf23b8dce36d1cf0d63123885bb8375 # v1
        id: out
        with:
          outputs: |-
            image-uri: ghcr.io/cdxgen/cdxgen-ruby-builder@${{ steps.build.outputs.digest }}
  containers-ruby-builder-arm64:
    if: github.repository == 'cdxgen/cdxgen'
    runs-on: 'ubuntu-24.04-arm'
    outputs:
      image-uri: ghcr.io/cdxgen/cdxgen-ruby-builder@${{ steps.build.outputs.digest }}
    permissions:
      packages: write  # needed for uploading images to GH package registry
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/cdxgen/cdxgen-ruby-builder
          flavor: latest=false,suffix=-arm64
      - name: Build and push Docker images
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        id: build
        with:
          context: .
          file: ci/images/al10/Dockerfile.ruby-builder
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: cloudposse/github-action-matrix-outputs-write@ed06cf3a6bf23b8dce36d1cf0d63123885bb8375 # v1
        id: out
        with:
          outputs: |-
            image-uri: ghcr.io/cdxgen/cdxgen-ruby-builder@${{ steps.build.outputs.digest }}
  containers-ruby-builder-deploy-manifest:
    if: github.repository == 'cdxgen/cdxgen'
    runs-on: ubuntu-24.04
    needs: [ containers-ruby-builder-amd64, containers-ruby-builder-arm64 ]
    outputs:
      image-uri: ghcr.io/cdxgen/cdxgen-ruby-builder@${{ steps.build.outputs.digest }}
    permissions:
      packages: write  # needed for uploading images to GH package registry
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: metadata
        with:
          images: ghcr.io/${{ github.repository }}
      - uses: int128/docker-manifest-create-action@fa55f72001a6c74b0f4997dca65c70d334905180  # v2.20.0
        id: build
        with:
          index-annotations: ${{ steps.metadata.outputs.labels }}
          tags: ghcr.io/cdxgen/cdxgen-ruby-builder:master
          sources: |
            ${{ needs.containers-ruby-builder-amd64.outputs.image-uri }}
            ${{ needs.containers-ruby-builder-arm64.outputs.image-uri }}
  containers:
    if: github.repository == 'cdxgen/cdxgen'
    runs-on: ubuntu-latest
    needs: [containers-ruby-builder-deploy-manifest]
    permissions:
      contents: write  # needed for creating GH releases and uploading release assets
      packages: write  # needed for uploading images to GH package registry
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org/
      - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true
      - name: Trim CI agent
        run: |
          chmod +x contrib/free_disk_space.sh
          ./contrib/free_disk_space.sh
      - run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/cdxgen/cdxgen
      - name: Build and push Docker images
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ci/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: setup nydus
        run: |
          curl -LO https://github.com/dragonflyoss/nydus/releases/download/v2.3.1/nydus-static-v2.3.1-linux-amd64.tgz
          tar -xvf nydus-static-v2.3.1-linux-amd64.tgz
          chmod +x nydus-static/*
          mv nydus-static/* /usr/local/bin/
          rm -rf nydus-static-v2.3.1-linux-amd64.tgz nydus-static
      - name: nydusify
        run: |
          nydusify convert --oci --oci-ref --source ${STEPS_META_OUTPUTS_TAGS} --target ${STEPS_META_OUTPUTS_TAGS}-nydus --prefetch-dir /opt/cdxgen
          nydusify check --target ${STEPS_META_OUTPUTS_TAGS}-nydus
        if: github.ref == 'refs/heads/master'
        continue-on-error: true
        env:
          STEPS_META_OUTPUTS_TAGS: ${{ steps.meta.outputs.tags }}
      - name: Attach cdx sbom
        run: |
          pnpm install:frozen
          tags="${STEPS_META_OUTPUTS_TAGS}"
          first_tag=$(echo "$tags" | head -n 1)
          node bin/cdxgen.js -t docker -o cdxgen-oci-image.cdx.json "$first_tag"
          node bin/verify.js -i cdxgen-oci-image.cdx.json --public-key contrib/bom-signer/public.key
          for tag in $tags; do
            echo "Processing tag: $tag"
            oras attach --artifact-type sbom/cyclonedx "$tag" ./cdxgen-oci-image.cdx.json:application/json
            oras discover --format tree "$tag"
            node bin/verify.js -i "$tag" --public-key contrib/bom-signer/public.key
          done
        env:
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-sboms
          DOCKER_USE_CLI: true
          SBOM_SIGN_ALGORITHM: RS512
          SBOM_SIGN_PRIVATE_KEY_BASE64: ${{ secrets.SBOM_SIGN_PRIVATE_KEY }}
          STEPS_META_OUTPUTS_TAGS: ${{ steps.meta.outputs.tags }}
      - name: Attach cdx sbom to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            cdxgen-oci-image.cdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  containers-secure:

name: Repo tests

on:
  pull_request:
    paths:
      - '.github/workflows/repotests.yml'
      - 'ci/assertions.sh'
      - '.nvmrc'
      - '.pnpmfile.cjs'
      - 'bin/**'
      - 'data/**'
      - 'index.cjs'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'test/data/cargo-cache-fixture/**'
      - 'test/data/cache-disable-repotest/**'
      - 'test/data/cbom-js-repotest/**'
      - 'test/data/cargo-workspace-repotest/**'
      - 'test/data/mcp-repotest/**'
      - '!**.poku.js'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NEXUS_URL: ${{ secrets.NEXUS_URL }}

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  cli-tests-quick-amd64:
    runs-on: ["self-hosted", "ubuntu", "amd64"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'hoolicorp/java-sec-code'
          path: 'repotests/java-sec-code'
      - name: Trim CI agent
        run: |
          rm -rf /tmp/docker-images-* /tmp/atom-usages-* /tmp/atom-reachables-* /tmp/cdx*
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Setup Nexus usage
        run: echo "registry=$NEXUS_URL" > .npmrc
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p bomresults
          rm -rf $CDXGEN_TEMP_DIR && mkdir -p $CDXGEN_TEMP_DIR
        env:
          CI: true
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-repotests
      - name: repotests java-sec-code
        run: |
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-1.json --include-formulation --include-crypto --fail-on-error
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-1.spdx.json --format spdx --fail-on-error
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-2.json --author foo --author bar --standard asvs-4.0.3
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-3.json --required-only --fail-on-error
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-4.json --filter postgres --filter json
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-5.json --only spring --fail-on-error
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-6.json --deep --evidence
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-7.json --profile research --spec-version 1.6 --export-proto
          node bin/convert.js -i bomresults/bom-java-sec-code-7.json -o bomresults/bom-java-sec-code-7.spdx.json
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-11.json --spec-version 1.7 --fail-on-error
          node bin/convert.js -i bomresults/bom-java-sec-code-11.json -o bomresults/bom-java-sec-code-11.spdx.json
          ls -lh bomresults
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-8.json --profile license-compliance
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-9.json --include-regex "pom.xml" --bom-audit
          bin/cdxgen.js -t java -t github repotests/java-sec-code -o bomresults/bom-java-sec-code-9.json
          bin/cdxgen.js -t java -exclude-type js repotests/java-sec-code -o bomresults/bom-java-sec-code-10.json
          bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-release-notes.json --include-release-notes --release-notes-current-tag v1.0.0 --release-notes-previous-tag v0.9.0 --fail-on-error
          jq -e 'any(.metadata.tools.components[]; .group == "@cyclonedx" and .name == "cdxgen" and (.releaseNotes.type != null) and (.releaseNotes.title != null) and (.releaseNotes.description != null) and (.releaseNotes.timestamp != null) and ((.releaseNotes.tags | length) >= 1) and (.releaseNotes.resolves | type == "array"))' bomresults/bom-java-sec-code-release-notes.json
          bin/cdxgen.js -t java https://github.com/HooliCorp/java-sec-code.git -o bomresults/bom-java-sec-code-git-url.json --git-branch master --fail-on-error --bom-audit
          bin/cdxgen.js -t js "pkg:npm/lodash@4.17.21" -o bomresults/bom-lodash-purl.json --fail-on-error
          bin/validate.js -i bomresults/bom-java-sec-code-10.json --format console --fail-severity critical
        shell: bash
        env:
          NPM_URL: ${{ env.NEXUS_URL }}
      - name: repotests java-sec-code (allow lists)
        run: |
          CDXGEN_ALLOWED_COMMANDS=none CDXGEN_ALLOWED_HOSTS=localhost bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-1.json
          CDXGEN_ALLOWED_COMMANDS=mvn CDXGEN_ALLOWED_HOSTS="*.maven.org,*.github.com" bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-2.json --fail-on-error
        shell: bash
        env:
          FETCH_LICENSE: true
          CDXGEN_TRACE_ID: foo
          CDXGEN_DEBUG_MODE: debug
      - name: repotests cargo fixture
        run: |
          bin/cdxgen.js -t cargo -t github test/data/cargo-workspace-repotest -o bomresults/bom-cargo-workspace-fixture.json --include-formulation --bom-audit
          jq -e 'any(.components[]; .name == "core" and any((.properties // [])[]; .name == "cdx:cargo:workspaceDependencyResolved" and .value == "true"))' bomresults/bom-cargo-workspace-fixture.json
          jq -e 'any(.components[]; .name == "build-helper" and any((.properties // [])[]; .name == "cdx:cargo:dependencyKind" and .value == "build") and any((.properties // [])[]; .name == "cdx:cargo:resolvedWorkspaceMember" and .value == "build-helper"))' bomresults/bom-cargo-workspace-fixture.json
          jq -e 'any(.components[]; any((.properties // [])[]; .name == "cdx:github:action:ecosystem" and .value == "cargo") and any((.properties // [])[]; .name == "cdx:github:action:role" and .value == "toolchain"))' bomresults/bom-cargo-workspace-fixture.json
          jq -e 'any(.components[]; any((.properties // [])[]; .name == "cdx:github:step:usesCargo" and .value == "true") and any((.properties // [])[]; .name == "cdx:github:step:cargoSubcommands" and .value == "build,test"))' bomresults/bom-cargo-workspace-fixture.json
          jq -e 'any(.annotations[]?; (.text // "") | contains("INT-012"))' bomresults/bom-cargo-workspace-fixture.json
          jq -e 'any(.annotations[]?; (.text // "") | contains("INT-013"))' bomresults/bom-cargo-workspace-fixture.json
          CARGO_CACHE_DIR=test/data/cargo-cache-fixture/registry/cache/index.crates.io-1949cf8c6b5b557f bin/cdxgen.js -t cargo-cache . -o bomresults/bom-cargo-cache-fixture.json --fail-on-error
          jq -e 'any(.components[]; .name == "serde" and any((.properties // [])[]; .name == "cdx:cargo:cacheSource" and .value == "registry-cache"))' bomresults/bom-cargo-cache-fixture.json
        shell: bash
      - name: repotests source crypto fixture
        run: |
          bin/cdxgen.js test/data/cbom-js-repotest -o bomresults/bom-cbom-js-fixture.json --include-crypto --evidence --deep --spec-version 1.7 --fail-on-error
          jq -e 'any(.components[]; .type == "cryptographic-asset" and .name == "sha-512" and .cryptoProperties.assetType == "algorithm" and .cryptoProperties.oid == "2.16.840.1.101.3.4.2.3")' bomresults/bom-cbom-js-fixture.json
          jq -e 'any(.components[]; .type == "cryptographic-asset" and .name == "aes256-GCM" and any((.properties // [])[]; .name == "cdx:crypto:sourceType" and .value == "js-ast:webcrypto.generateKey"))' bomresults/bom-cbom-js-fixture.json
          jq -e 'any(.components[]; .type == "cryptographic-asset" and .name == "sha-384" and any((.properties // [])[]; .name == "cdx:crypto:sourceLocation" and .value == "dynamic-branches.mjs:12:0") and any((.evidence.occurrences // [])[]; .location == "dynamic-branches.mjs" and .line == 12 and .symbol == "node:crypto.createHash" and .additionalContext == "hash" and (.offset? == null)))' bomresults/bom-cbom-js-fixture.json
          jq -e 'any(.components[]; .type == "cryptographic-asset" and .name == "sha-384" and any((.properties // [])[]; .name == "cdx:crypto:sourceType" and .value == "js-ast:node:crypto.sign") and any((.evidence.occurrences // [])[]; .location == "dynamic-branches.mjs" and .symbol == "node:crypto.sign" and .additionalContext == "signature" and (.offset? == null)))' bomresults/bom-cbom-js-fixture.json
          jq -e 'any(.components[]; .type == "cryptographic-asset" and .name == "sha-256" and any((.properties // [])[]; .name == "cdx:crypto:sourceType" and .value == "js-ast:node:crypto.sign") and any((.evidence.occurrences // [])[]; .location == "dynamic-branches.mjs" and .symbol == "node:crypto.sign" and .additionalContext == "signature" and (.offset? == null)))' bomresults/bom-cbom-js-fixture.json
          jq -e 'any(.components[]; .type == "cryptographic-asset" and .name == "sha256WithRSAEncryption" and any((.properties // [])[]; .name == "cdx:crypto:sourceType" and .value == "js-ast:jsonwebtoken.sign"))' bomresults/bom-cbom-js-fixture.json
          jq -e 'any(.components[]; .type == "cryptographic-asset" and .name == "sha512WithRSAEncryption" and any((.properties // [])[]; .name == "cdx:crypto:sourceType" and .value == "js-ast:jsonwebtoken.sign"))' bomresults/bom-cbom-js-fixture.json
          jq -e 'any(.components[]; .type == "cryptographic-asset" and .name == "aes256-CBC" and any((.properties // [])[]; .name == "cdx:crypto:sourceType" and .value == "js-ast:webcrypto.generateKey"))' bomresults/bom-cbom-js-fixture.json
          jq -e 'any(.components[]; .type == "cryptographic-asset" and .name == "sha-512" and any((.evidence.occurrences // [])[]; .location == "dynamic-branches.mjs" and .line == 40 and .symbol == "node:crypto.sign" and .additionalContext == "signature" and (.offset? == null)))' bomresults/bom-cbom-js-fixture.json
          jq -e 'any(.components[]; .type == "cryptographic-asset" and .name == "sha-384" and any((.evidence.occurrences // [])[]; .location == "dynamic-branches.mjs" and .line == 62 and .symbol == "node:crypto.sign" and .additionalContext == "signature" and (.offset? == null)))' bomresults/bom-cbom-js-fixture.json
          jq -e 'all(.components[]? | select(.type == "cryptographic-asset" and .cryptoProperties.assetType == "algorithm"); .cryptoProperties.oid != null)' bomresults/bom-cbom-js-fixture.json
        shell: bash
      - name: repotests cdxgen self source crypto
        run: |
          node --input-type=module <<'EOF'
          import { writeFileSync } from "node:fs";

          import { collectSourceCryptoComponents } from "./lib/helpers/cbomutils.js";

          const targets = [
            "./lib/helpers",
            "./bin",
            "./lib/audit",
            "./lib/stages",
            "./lib/server",
            "./lib/managers",
            "./lib/evinser",
            "./lib/parsers",
          ];
          const expectedNonEmptyTargets = new Set([
            "./lib/helpers",
            "./bin",
            "./lib/audit",
          ]);
          const inventory = {};
          for (const target of targets) {
            const components = await collectSourceCryptoComponents(target, {
              deep: false,
              evidence: true,
              specVersion: 1.7,
            });
            if (expectedNonEmptyTargets.has(target) && !components.length) {
              throw new Error(`Expected source-derived crypto components for ${target}`);
            }
            if (!expectedNonEmptyTargets.has(target) && components.length) {
              throw new Error(
                `Expected no source-derived crypto components for ${target}, found ${components.length}`,
              );
            }
            inventory[target] = components;
          }
          writeFileSync(
            "bomresults/bom-cdxgen-self-source-cbom.json",
            JSON.stringify(inventory, null, 2),
          );
          EOF
          jq -e 'any(.["./lib/helpers"][]; .type == "cryptographic-asset" and .name == "sha-256" and .cryptoProperties.assetType == "algorithm" and any((.properties // [])[]; .name == "cdx:crypto:sourceType" and .value == "js-ast:node:crypto.createHash") and ((.evidence.identity // []) | length) > 0 and .evidence.identity[0].field == "name" and ((.evidence.identity[0].methods // []) | length) > 0 and ((.evidence.occurrences // []) | length) > 0)' bomresults/bom-cdxgen-self-source-cbom.json
          jq -e '([.["./lib/helpers"][], .["./bin"][], .["./lib/audit"][]]) | all(.[]?; .type != "cryptographic-asset" or ((.cryptoProperties.assetType // "") != "algorithm") or (all((.evidence.occurrences // [])[]?; .location != null and (.line? == null or (.line | type == "number")) and (.offset? == null))))' bomresults/bom-cdxgen-self-source-cbom.json
          jq -e '([.["./lib/helpers"][], .["./bin"][], .["./lib/audit"][]]) | all(.[]?; .type != "cryptographic-asset" or ((.cryptoProperties.assetType // "") != "algorithm") or ((((.evidence.identity // []) | length) > 0) and (((.evidence.occurrences // []) | length) > 0)))' bomresults/bom-cdxgen-self-source-cbom.json
          jq -e '((.["./bin"] | length) > 0) and ((.["./lib/audit"] | length) > 0)' bomresults/bom-cdxgen-self-source-cbom.json
          jq -e '((.["./lib/stages"] | length) == 0) and ((.["./lib/server"] | length) == 0) and ((.["./lib/managers"] | length) == 0) and ((.["./lib/evinser"] | length) == 0) and ((.["./lib/parsers"] | length) == 0)' bomresults/bom-cdxgen-self-source-cbom.json
        shell: bash
      - name: repotests cache-disable fixture
        run: |
          bin/cdxgen.js -t js -t python -t cargo -t github test/data/cache-disable-repotest -o bomresults/bom-cache-disable-fixture.json --bom-audit --bom-audit-categories ci-permission --fail-on-error
          jq -e 'any(.components[]; .purl == "pkg:github/actions/setup-node@v4" and any((.properties // [])[]; .name == "cdx:github:action:disablesBuildCache" and .value == "true"))' bomresults/bom-cache-disable-fixture.json
          jq -e 'any(.components[]; .purl == "pkg:github/actions/setup-python@v5" and any((.properties // [])[]; .name == "cdx:github:action:disablesBuildCache" and .value == "true"))' bomresults/bom-cache-disable-fixture.json
          jq -e 'any(.components[]; .purl == "pkg:github/moonrepo/setup-rust@v1" and any((.properties // [])[]; .name == "cdx:github:action:buildCacheEcosystem" and .value == "cargo"))' bomresults/bom-cache-disable-fixture.json
          jq -e 'any(.components[]; .purl == "pkg:npm/left-pad@1.3.0" and any((.properties // [])[]; .name == "cdx:npm:manifestSourceType" and .value == "url"))' bomresults/bom-cache-disable-fixture.json
          jq -e 'any(.components[]; .purl == "pkg:pypi/anyio@4.6.0" and any((.properties // [])[]; .name == "cdx:pypi:manifestSourceType" and .value == "url"))' bomresults/bom-cache-disable-fixture.json
          jq -e 'any(.components[]; .name == "git-crate" and any((.properties // [])[]; .name == "cdx:cargo:git" and .value == "https://github.com/acme/git-crate.git"))' bomresults/bom-cache-disable-fixture.json
          jq -e 'any(.annotations[]?; (.text // "") | contains("CI-022"))' bomresults/bom-cache-disable-fixture.json
          jq -e 'any(.annotations[]?; (.text // "") | contains("CI-023"))' bomresults/bom-cache-disable-fixture.json
          jq -e 'any(.annotations[]?; (.text // "") | contains("CI-024"))' bomresults/bom-cache-disable-fixture.json
        shell: bash
      - name: repotests cargo dry-run fixture
        run: |
          bin/cdxgen.js --dry-run -t cargo -t github test/data/cargo-workspace-repotest --no-banner > bomresults/dry-run-cargo-workspace.txt
          grep -q "cdxgen dry-run activity summary" bomresults/dry-run-cargo-workspace.txt
          grep -q "cargo" bomresults/dry-run-cargo-workspace.txt
          grep -q "validate" bomresults/dry-run-cargo-workspace.txt
          grep -q "write" bomresults/dry-run-cargo-workspace.txt
          bin/cdxgen.js --dry-run -t js test/data/yarn-workspaces-same-version-demo --no-banner > bomresults/dry-run-js-workspace.txt
          grep -q "cdxgen dry-run activity summary" bomresults/dry-run-js-workspace.txt
          grep -q "npm" bomresults/dry-run-js-workspace.txt
          printf 'test-private-key' > /tmp/cdxgen-dry-run-signing.key
          SBOM_SIGN_ALGORITHM=RS512 SBOM_SIGN_PRIVATE_KEY=/tmp/cdxgen-dry-run-signing.key bin/cdxgen.js --dry-run -t js test/data/dry-run-private-registry-repotest --no-banner > bomresults/dry-run-private-registry.txt
          grep -q "cdxgen dry-run activity summary" bomresults/dry-run-private-registry.txt
          grep -q ".npmrc" bomresults/dry-run-private-registry.txt
          grep -q "process.env:SBOM_SIGN_PRIVATE_KEY" bomresults/dry-run-private-registry.txt
          mkdir -p /tmp/cdxgen-docker-config
          cat <<'JSON' > /tmp/cdxgen-docker-config/config.json
          {
            "credHelpers": {
              "docker.io": "osxkeychain"
            }
          }
          JSON
          DOCKER_CONFIG=/tmp/cdxgen-docker-config bin/cdxgen.js --dry-run -t oci docker.io/library/alpine:3.20 --no-banner > bomresults/dry-run-oci-private-registry.txt
          grep -q "process.env:DOCKER_CONFIG" bomresults/dry-run-oci-private-registry.txt
          bin/cdxgen.js --dry-run -t js "pkg:npm/lodash@4.17.21" --no-banner > bomresults/dry-run-purl.txt
          grep -q "pkg:npm/lodash@4.17.21" bomresults/dry-run-purl.txt
        shell: bash
        continue-on-error: true
      - name: repotests MCP fixture
        run: |
          bin/cdxgen.js -t js test/data/mcp-repotest -o bomresults/bom-mcp-repotest.json --bom-audit --bom-audit-categories mcp-server --fail-on-error
          jq -e 'any(.services[]; .name == "auth-http-server" and .authenticated == true and any((.properties // [])[]; .name == "cdx:mcp:transport" and (.value | contains("streamable-http"))))' bomresults/bom-mcp-repotest.json
          jq -e 'any(.services[]; .name == "unsafe-http-server" and .authenticated == false and any((.properties // [])[]; .name == "cdx:mcp:officialSdk" and .value == "false"))' bomresults/bom-mcp-repotest.json
          jq -e 'any(.components[]; .name == "server" and any((.tags // [])[]; . == "official-mcp-sdk"))' bomresults/bom-mcp-repotest.json
          jq -e 'any(.annotations[]?; (.text // "") | contains("MCP-001"))' bomresults/bom-mcp-repotest.json
          jq -e 'any(.annotations[]?; (.text // "") | contains("MCP-003"))' bomresults/bom-mcp-repotest.json
        shell: bash
      - name: repotests signed ASAR fixture
        run: |
          mkdir -p repotests/signed-asar/Signed.app/Contents/Resources
          curl -L --fail --silent --show-error https://raw.githubusercontent.com/electron/asar/8388dbd1ed7a290d05d1144ba833d895193d2cb3/test/expected/packthis.asar -o repotests/signed-asar/Signed.app/Contents/Resources/app.asar
          header_hash=$(node --input-type=module <<'EOF'
          import { createHash } from "node:crypto";
          import { readAsarArchiveHeaderSync } from "./lib/helpers/asarutils.js";

          const { headerString } = readAsarArchiveHeaderSync(
            "./repotests/signed-asar/Signed.app/Contents/Resources/app.asar",
          );
          console.log(
            createHash("sha256").update(headerString, "utf8").digest("hex"),
          );
          EOF
          )
          cat <<EOF > repotests/signed-asar/Signed.app/Contents/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>ElectronAsarIntegrity</key>
              <dict>
                <key>Resources/app.asar</key>
                <dict>
                  <key>algorithm</key>
                  <string>SHA256</string>
                  <key>hash</key>
                  <string>${header_hash}</string>
                </dict>
              </dict>
            </dict>
          </plist>
          EOF
          bin/cdxgen.js -t asar repotests/signed-asar/Signed.app/Contents/Resources/app.asar -o bomresults/bom-signed-asar.json --spec-version 1.7 --fail-on-error
          bin/validate.js -i bomresults/bom-signed-asar.json --report console --fail-severity critical
          jq -e 'any(.components[]; .type == "cryptographic-asset" and any((.properties // [])[]; .name == "cdx:asar:signingVerified" and .value == "true"))' bomresults/bom-signed-asar.json
          jq -e '([.metadata.component] + (.components // [])) | any(.[]; any((.properties // [])[]; .name == "cdx:file:kind" and .value == "asar-archive") and any((.properties // [])[]; .name == "cdx:asar:signingScope" and .value == "header-only"))' bomresults/bom-signed-asar.json
        shell: bash
  cli-tests-quick-arm64:
    runs-on: ["self-hosted", "ubuntu", "arm64"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.3'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'aws-solutions/iot-device-simulator'
          path: 'repotests/iot-device-simulator'
          ref: 'v3.0.9'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'ollama/ollama'
          path: 'repotests/ollama'
          ref: 'v0.5.7'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'caddyserver/caddy'
          path: 'repotests/caddy'
          ref: 'v2.9.1'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'flutter/gallery'
          ref: 'v2.10.2'
          path: 'repotests/gallery'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'ShiftLeftSecurity/shiftleft-go-example'
          path: 'repotests/shiftleft-go-example'
      - name: Trim CI agent
        run: rm -rf /tmp/docker-images-* /tmp/atom-*  /tmp/mvn-deps*
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Setup Nexus usage
        run: echo "registry=$NEXUS_URL" > .npmrc
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p bomresults
          rm -rf $CDXGEN_TEMP_DIR && mkdir -p $CDXGEN_TEMP_DIR
        env:
          CI: true
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-repotests
      - name: repotests iot-device-simulator
        run: |
          bin/cdxgen.js -t js -o bomresults/bom-iot.json repotests/iot-device-simulator --fail-on-error
          bin/cdxgen.js -t js -o bomresults/bom-iot15.json repotests/iot-device-simulator --spec-version 1.5 --fail-on-error
          bin/cdxgen.js -t js -o bomresults/bom-iot16.json repotests/iot-device-simulator --spec-version 1.6 --fail-on-error
          node bin/convert.js -i bomresults/bom-iot16.json -o bomresults/bom-iot16.spdx.json
          bin/cdxgen.js -t js -o bomresults/bom-iot17.json repotests/iot-device-simulator --spec-version 1.7 --fail-on-error
          node bin/convert.js -i bomresults/bom-iot17.json -o bomresults/bom-iot17.spdx.json
          bin/cdxgen.js -t js -o bomresults/bom-iot-git-url.json --git-branch v3.0.9 https://github.com/aws-solutions/iot-device-simulator.git --fail-on-error
        shell: bash
      - name: repotests ollama
        run: |
          bin/cdxgen.js -r -t go repotests/ollama -o bomresults/bom-ollama.json --fail-on-error --bom-audit
          bin/cdxgen.js -r -t go repotests/caddy -o bomresults/bom-caddy.json --fail-on-error
        shell: bash
      - name: repotests go mod tests
        run: |
          mkdir -p gomod-example
          cd gomod-example
          curl -LO https://raw.githubusercontent.com/anchore/syft/main/go.mod
          cd ..
          bin/cdxgen.js -r -t go gomod-example -o bomresults/bom-gomod.json
        shell: bash
      - name: repotests shiftleft-go-example
        run: |
          FETCH_LICENSE=false bin/cdxgen.js -r -t golang repotests/shiftleft-go-example -o bomresults/bom-go.json --fail-on-error --spec-version 1.6 --export-proto
        shell: bash
      - name: repotests gallery
        run: |
          bin/cdxgen.js -r -t dart repotests/gallery -o bomresults/bom-pub.json --fail-on-error --bom-audit
          bin/validate.js -i bomresults/bom-pub.json -o bomresults/bom-pub.sarif --report sarif --fail-severity critical
          ls -l bomresults/bom-pub.sarif
        shell: bash
      - name: Cleanup
        run: rm -rf /tmp/docker-images-* /tmp/atom-*  /tmp/mvn-deps*
  cli-tests:

      - name: buntests
        run: |
          rm -rf node_modules
          bun install
          bun --bun bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-bun.json --deep
          bun --bun bin/cdxgen.js -t python repotests/django-DefectDojo -o bomresults/django-DefectDojo-bun.json
        continue-on-error: true
        shell: bash
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: github.ref == 'refs/heads/master' && matrix.os == 'ubuntu-24.04-arm'
        with:
          name: bomresults
          path: bomresults

  secure-mode-tests:
    strategy:
      fail-fast: true
      matrix:
        java-version: ['24']
        os: ['ubuntu-24.04', 'ubuntu-24.04-arm', 'macos-15']
    runs-on: ${{ matrix.os }}
    env:
      CDXGEN_DEBUG_MODE: verbose
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}
      - uses: sbt/setup-sbt@93e926cbdb4a428e41b4ef754124ec82925ffdc2 # v1.1.23
      - uses: coursier/setup-action@fd1707a76b027efdfb66ca79318b4d29b72e5a02 # v3.0.0
        with:
          apps: scala3 scalac
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.3'
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Trim CI agent
        if: matrix.os == 'ubuntu-24.04' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          chmod +x contrib/free_disk_space.sh
          ./contrib/free_disk_space.sh
      - uses: sbt/setup-sbt@93e926cbdb4a428e41b4ef754124ec82925ffdc2 # v1.1.23
      - name: Install bazelisk - linux
        if: matrix.os == 'ubuntu-24.04'
        run: |
          curl -LO "https://github.com/bazelbuild/bazelisk/releases/download/v1.20.0/bazelisk-linux-amd64"
          sudo mv bazelisk-linux-amd64 /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel
      - name: Install bazelisk - linux arm
        if: matrix.os == 'ubuntu-24.04-arm'
        run: |
          curl -LO "https://github.com/bazelbuild/bazelisk/releases/download/v1.20.0/bazelisk-linux-arm64"
          sudo mv bazelisk-linux-arm64 /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel
      - name: Install bazelisk - mac
        if: matrix.os == 'macos-15'
        run: |
          brew install bazelisk
      - name: Install bazelisk - windows
        if: matrix.os == 'windows-latest'
        run: choco install -y bazel
      - name: pnpm install, build and test
        run: |
          pnpm install:frozen
          ls -al node_modules/@cdxgen/cdxgen-plugins-bin*
          mkdir -p repotests
          mkdir -p bomresults
        env:
          CI: true
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-repotests
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
      - uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde  # v1.307.0
        with:
          ruby-version: '3.4.9'
      - name: pip install custom-json-diff
        run: |
          pip install custom-json-diff
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'hoolicorp/java-sec-code'
          path: 'repotests/java-sec-code'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'quarkusio/quarkus-quickstarts'
          path: 'repotests/quarkus-quickstarts'
          ref: '3.17.3'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'aws-solutions/iot-device-simulator'
          path: 'repotests/iot-device-simulator'
          ref: 'v3.0.9'
      - name: repotests - no exec
        run: |
          bin/cdxgen.js -t pnpm ${GITHUB_WORKSPACE} --no-recurse -o ${GITHUB_WORKSPACE}/bomresults/bom-self.json --fail-on-error
        shell: bash
        env:
          NODE_OPTIONS: "--permission --allow-fs-read=${{ runner.temp }}/cdxgen-repotests/* --allow-fs-read=${{ github.workspace }}/* --allow-fs-write=${{ github.workspace }}/bomresults/bom-self.json --trace-warnings"
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-repotests
          JAVA_HOME: ""
      - name: repotests - allowlist
        run: |
          bin/cdxgen.js -t pnpm ${GITHUB_WORKSPACE} --no-recurse -o ${GITHUB_WORKSPACE}/bomresults/bom-self.json --fail-on-error
        shell: bash
        env:
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-repotests
          JAVA_HOME: ""
          CDXGEN_ALLOWED_COMMANDS: "node"
          CDXGEN_ALLOWED_HOSTS: "registry.npmjs.org"
          CDXGEN_TRACE_MODE: true
      - name: repotests
        run: |
          CDXGEN_ALLOWED_COMMANDS=mvn bin/cdxgen.js -t java ${GITHUB_WORKSPACE}/repotests/java-sec-code -o ${GITHUB_WORKSPACE}/bomresults/bom-java-sec-code-1.json --fail-on-error
          CDXGEN_ALLOWED_COMMANDS=mvn bin/cdxgen.js -t java ${GITHUB_WORKSPACE}/repotests/java-sec-code -o ${GITHUB_WORKSPACE}/bomresults/bom-java-sec-code-2.json --author foo --author bar --standard asvs-4.0.3
          CDXGEN_ALLOWED_COMMANDS=mvn bin/cdxgen.js -t java ${GITHUB_WORKSPACE}/repotests/java-sec-code -o ${GITHUB_WORKSPACE}/bomresults/bom-java-sec-code-3.json --required-only --fail-on-error
          CDXGEN_ALLOWED_COMMANDS=mvn bin/cdxgen.js -t java ${GITHUB_WORKSPACE}/repotests/java-sec-code -o ${GITHUB_WORKSPACE}/bomresults/bom-java-sec-code-4.json --filter postgres --filter json
          CDXGEN_ALLOWED_COMMANDS=mvn bin/cdxgen.js -r -t quarkus ${GITHUB_WORKSPACE}/repotests/quarkus-quickstarts -o ${GITHUB_WORKSPACE}/bomresults/bom-quarkus-quickstarts-quarkus.json --no-recurse --fail-on-error
          CDXGEN_ALLOWED_COMMANDS=npm bin/cdxgen.js -t js -o ${GITHUB_WORKSPACE}/bomresults/bom-iot.json ${GITHUB_WORKSPACE}/repotests/iot-device-simulator --fail-on-error
        shell: bash
        env:
          NODE_OPTIONS: "--permission --allow-fs-read=/home/runner/* --allow-fs-read=/tmp/* --allow-fs-read=/run/user/1001/* --allow-fs-read=/opt/hostedtoolcache/* --allow-fs-write=/tmp/* --allow-fs-read=/Users/runner/* --allow-fs-read=${{ github.workspace }}/* --allow-fs-write=${{ github.workspace }}/bomresults/*.json --allow-fs-read=${{ runner.temp }}/* --allow-fs-write=${{ runner.temp }}/* --allow-child-process --trace-warnings"
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-repotests
          CDXGEN_TRACE_ID: foo
          CDXGEN_DEBUG_MODE: debug

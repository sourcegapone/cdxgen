          mkdir -p standalone-chrome-exts/jjjjjjjjjjjjjjjjjjjjjjjjjjjjjjjj/0.1.0
          mkdir -p standalone-chrome-exts/kkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkk/1.0.0
          cp test/data/chrome-extensions/chrome-youtube-summary-chatgpt-manifest.json standalone-chrome-exts/iiiiiiiiiiiiiiiiiiiiiiiiiiiiiiii/1.0.4/manifest.json
          cp test/data/chrome-extensions/chrome-agentbrain-chatgpt-claude-manifest.json standalone-chrome-exts/jjjjjjjjjjjjjjjjjjjjjjjjjjjjjjjj/0.1.0/manifest.json
          cp test/data/chrome-extensions/chrome-copilottts-manifest.json standalone-chrome-exts/kkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkk/1.0.0/manifest.json
          bin/cdxgen.js standalone-chrome-exts/iiiiiiiiiiiiiiiiiiiiiiiiiiiiiiii/1.0.4 -t chrome-extension -o bomresults/bom-standalone-chrome-openai.json --bom-audit
          bin/cdxgen.js standalone-chrome-exts/jjjjjjjjjjjjjjjjjjjjjjjjjjjjjjjj/0.1.0 -t chrome-extension -o bomresults/bom-standalone-chrome-anthropic.json --bom-audit
          bin/cdxgen.js standalone-chrome-exts/kkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkk/1.0.0 -t chrome-extension -o bomresults/bom-standalone-chrome-copilot.json --bom-audit
        shell: bash
      - name: post-build lifecycle tests
        run: |
          python3 -m pip install blint
          mkdir -p bintests
          cd bintests
          curl -LO https://github.com/owasp-dep-scan/dosai/releases/download/v0.1.1/Dosai.exe
          curl -LO https://github.com/owasp-dep-scan/dosai/releases/download/v0.1.1/Dosai
          curl -LO https://github.com/owasp-dep-scan/dosai/releases/download/v0.1.1/Dosai-osx-arm64
          cd ..
          bin/cdxgen.js -t dotnet --lifecycle post-build -o bomresults/bom-binary.json bintests
          source ci/assertions.sh
          assert_non_cdxgen_tool_identity_bom bomresults/bom-binary.json
          mkdir -p gobintests
          cd gobintests
          curl -LO https://github.com/anchore/syft/releases/download/v1.0.1/syft_1.0.1_linux_arm64.tar.gz
          tar -xvf syft_1.0.1_linux_arm64.tar.gz
          rm syft_1.0.1_linux_arm64.tar.gz
          curl -LO https://github.com/containerd/containerd/releases/download/v2.0.0-rc.0/containerd-static-2.0.0-rc.0-linux-amd64.tar.gz
          tar -xvf containerd-static-2.0.0-rc.0-linux-amd64.tar.gz
          rm containerd-static-2.0.0-rc.0-linux-amd64.tar.gz
          cd ..
          bin/cdxgen.js -t go --lifecycle post-build -o bomresults/bom-go-binary.json gobintests
          assert_non_cdxgen_tool_identity_bom bomresults/bom-go-binary.json
        shell: bash
        if: matrix.os != 'windows-latest'
      - name: repotests 1.7
        run: |
          bin/cdxgen.js -r -t java repotests/shiftleft-java-example -o bomresults/1.7-bom-java.json --generate-key-and-sign --tlp-classification AMBER --spec-version 1.7
          SBOM_SIGN_ALGORITHM=RS512 SBOM_SIGN_PRIVATE_KEY=bomresults/private.key SBOM_SIGN_PUBLIC_KEY=bomresults/public.key bin/cdxgen.js -r -t github repotests/shiftleft-java-example -o bomresults/1.7-bom-github.json --spec-version 1.7
          FETCH_LICENSE=0 bin/cdxgen.js -r -t js repotests/shiftleft-ts-example -o bomresults/1.7-bom-ts-1.json --fail-on-error --spec-version 1.7 --tlp-classification RED
        shell: bash
      - name: repotests 1.6
        run: |
          bin/cdxgen.js -r -t java repotests/shiftleft-java-example -o bomresults/1.6-bom-java.json --generate-key-and-sign --spec-version 1.6
          SBOM_SIGN_ALGORITHM=RS512 SBOM_SIGN_PRIVATE_KEY=bomresults/private.key SBOM_SIGN_PUBLIC_KEY=bomresults/public.key bin/cdxgen.js -r -t github repotests/shiftleft-java-example -o bomresults/1.6-bom-github.json --spec-version 1.6
          FETCH_LICENSE=0 bin/cdxgen.js -r -t js repotests/shiftleft-ts-example -o bomresults/1.6-bom-ts-1.json --fail-on-error --spec-version 1.6
          FETCH_LICENSE=1 bin/cdxgen.js -r -t javascript repotests/shiftleft-ts-example --required-only -o bomresults/1.6-bom-ts-2.json --fail-on-error --spec-version 1.6
          FETCH_LICENSE=true bin/cdxgen.js -r -t csharp repotests/vulnerable_net_core -o bomresults/1.6-bom-csharp2.json --spec-version 1.6
          FETCH_LICENSE=false bin/cdxgen.js -r repotests/Goatly.NET -o bomresults/1.6-bom-csharp3.json --spec-version 1.6
          FETCH_LICENSE=true bin/cdxgen.js -r -t python repotests/DjanGoat -o bomresults/1.6-bom-python.json --fail-on-error --spec-version 1.6
          bin/cdxgen.js -r -t php repotests/Vulnerable-Web-Application -o bomresults/1.6-bom-php.json --fail-on-error --spec-version 1.6
        shell: bash
      - name: repotests 1.5
        run: |
          bin/cdxgen.js -r -t java repotests/shiftleft-java-example -o bomresults/1.5-bom-java.json --generate-key-and-sign --spec-version 1.5 --fail-on-error
          SBOM_SIGN_ALGORITHM=RS512 SBOM_SIGN_PRIVATE_KEY=bomresults/private.key SBOM_SIGN_PUBLIC_KEY=bomresults/public.key bin/cdxgen.js -r -t github repotests/shiftleft-java-example -o bomresults/1.5-bom-github.json --spec-version 1.5 --fail-on-error
          FETCH_LICENSE=0 bin/cdxgen.js -r -t js repotests/shiftleft-ts-example -o bomresults/1.5-bom-ts-1.json --fail-on-error --spec-version 1.5 --fail-on-error
          FETCH_LICENSE=1 bin/cdxgen.js -r -t javascript repotests/shiftleft-ts-example --required-only -o bomresults/1.5-bom-ts-2.json --fail-on-error --spec-version 1.5
          FETCH_LICENSE=true bin/cdxgen.js -r -t csharp repotests/vulnerable_net_core -o bomresults/1.5-bom-csharp2.json --spec-version 1.5 --fail-on-error
          FETCH_LICENSE=false bin/cdxgen.js -r repotests/Goatly.NET -o bomresults/1.5-bom-csharp3.json --spec-version 1.5
          FETCH_LICENSE=true bin/cdxgen.js -r -t python repotests/DjanGoat -o bomresults/1.5-bom-python.json --fail-on-error --spec-version 1.5
          bin/cdxgen.js -r -t php repotests/Vulnerable-Web-Application -o bomresults/1.5-bom-php.json --fail-on-error --spec-version 1.5
        shell: bash
      - name: list repotest bomresults
        run: |
          ls -ltr bomresults
        shell: bash
      - name: denotests
        run: |
          deno info bin/cdxgen.js
          deno info bin/evinse.js
          deno run --allow-read --allow-env --allow-run --allow-sys=uid,systemMemoryInfo,gid,osRelease,homedir --allow-write --allow-net bin/cdxgen.js -t java repotests/java-sec-code -o bomresults/bom-java-sec-code-deno.json --deep
          deno run --allow-read --allow-env --allow-run --allow-sys=uid,systemMemoryInfo,gid,osRelease,homedir --allow-write --allow-net bin/cdxgen.js -t python repotests/django-DefectDojo -o bomresults/django-DefectDojo-deno.json --deep
        env:
          FETCH_LICENSE: true

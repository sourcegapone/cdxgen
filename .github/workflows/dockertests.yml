name: docker tests

on:
  pull_request:
    paths:
      - '.github/workflows/dockertests.yml'
      - 'ci/assertions.sh'
      - '.nvmrc'
      - '.pnpmfile.cjs'
      - 'bin/**'
      - 'ci/**'
      - 'data/**'
      - 'index.cjs'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '!**.poku.js'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  linux-tests:
    strategy:
      fail-fast: true
      matrix:
        os: ['ubuntu-24.04', 'ubuntu-24.04-arm']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p bomresults
        env:
          CI: true
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-dockertests
      - name: dockertests
        if: matrix.os == 'ubuntu-24.04'
        run: |
          source ci/assertions.sh
          bin/cdxgen.js ubuntu:latest -p -t docker -o bomresults/bom-ubuntu.json --fail-on-error
          bin/cdxgen.js ubuntu:latest -p -t docker -o bomresults/bom-ubuntu-audit.json --bom-audit --bom-audit-categories container-risk --fail-on-error
          assert_container_audit_bom bomresults/bom-ubuntu-audit.json
          assert_trivy_tool_identity_bom bomresults/bom-ubuntu-audit.json
          docker rmi ubuntu:latest
          bin/cdxgen.js alpine:latest -p -t docker -o bomresults/bom-alpine.json --fail-on-error
          bin/cdxgen.js alpine:latest -p -t docker -o bomresults/bom-alpine-audit.json --bom-audit --bom-audit-categories container-risk --fail-on-error
          assert_container_audit_bom bomresults/bom-alpine-audit.json
          assert_trivy_tool_identity_bom bomresults/bom-alpine-audit.json
          docker rmi alpine:latest
          bin/cdxgen.js almalinux:9.4-minimal -p -t docker -o bomresults/bom-almalinux.json --fail-on-error
          docker rmi almalinux:9.4-minimal
          bin/cdxgen.js phpmyadmin@sha256:1092481630056189e43cc0fe66fd01defcc9334d78ab4611b22f65e9a39869bd -p -o bomresults/bom-phpmyadmin.json --fail-on-error
          docker rmi phpmyadmin@sha256:1092481630056189e43cc0fe66fd01defcc9334d78ab4611b22f65e9a39869bd
          bin/cdxgen.js shiftleft/scan-slim -o bomresults/bom-scanslim.json -p -t container --fail-on-error
          docker rmi shiftleft/scan-slim
          bin/cdxgen.js redmine@sha256:a5c5f8a64a0d9a436a0a6941bc3fb156be0c89996add834fe33b66ebeed2439e -p -o bomresults/bom-redmine.json --fail-on-error
          docker rmi redmine@sha256:a5c5f8a64a0d9a436a0a6941bc3fb156be0c89996add834fe33b66ebeed2439e
          bin/cdxgen.js rocket.chat@sha256:379f7afa0e67497c363ac9a9b3e7e6a6d31deee228233307c987e4a0c68b28e6 -p -o bomresults/bom-rocket.json --fail-on-error
          docker rmi rocket.chat@sha256:379f7afa0e67497c363ac9a9b3e7e6a6d31deee228233307c987e4a0c68b28e6
          bin/cdxgen.js sonarqube@sha256:7c0edcb99c964984db6d24330db33bb12de1e8ae0d5974d77640b1efea1483d1 -p -o bomresults/bom-sonar.json --fail-on-error
          docker rmi sonarqube@sha256:7c0edcb99c964984db6d24330db33bb12de1e8ae0d5974d77640b1efea1483d1
          bin/cdxgen.js zookeeper@sha256:5bf00616677db5ef57d8a2da7c5dadf67f1a6be54b0c33a79be3332c9c80aeb6 -p -o bomresults/bom-zoo.json --fail-on-error
          docker rmi zookeeper@sha256:5bf00616677db5ef57d8a2da7c5dadf67f1a6be54b0c33a79be3332c9c80aeb6
          docker pull shiftleft/scan-slim:latest
          docker save shiftleft/scan-slim:latest -o /tmp/scanslim.tar
          docker rmi shiftleft/scan-slim:latest
          bin/cdxgen.js /tmp/scanslim.tar -p -o bomresults/bom-scanarch.json --fail-on-error
          rm /tmp/scanslim.tar
          ls -ltr bomresults
        env:
          CDXGEN_DEBUG_MODE: debug
      - name: dockertests arm
        run: |
          bin/cdxgen.js ubuntu:latest -p -t docker -o bomresults/bom-ubuntu.json --fail-on-error
          docker rmi ubuntu:latest
          bin/cdxgen.js alpine:latest -p -t docker -o bomresults/bom-alpine.json --fail-on-error
          docker rmi alpine:latest
          bin/cdxgen.js almalinux:9.4-minimal -p -t docker -o bomresults/bom-almalinux.json --fail-on-error
          docker rmi almalinux:9.4-minimal
          ls -ltr bomresults
        env:
          CDXGEN_DEBUG_MODE: debug
  linux-dockertar-tests:
    strategy:
      fail-fast: true
      matrix:
        os: ['ubuntu-24.04', 'ubuntu-24.04-arm']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p bomresults repotests
        env:
          CI: true
      - name: dockertests
        run: bash ci/dockertests.sh docker
        env:
          CDXGEN_DEBUG_MODE: debug
  linux-podman-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p bomresults
        env:
          CI: true
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-podmantests
      - name: podmantests
        run: bash ci/dockertests.sh podman
        env:
          CDXGEN_DEBUG_MODE: debug
  linux-nerdctl-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p bomresults
        env:
          CI: true
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-nerdctltests
      - name: nerdctltests
        run: bash ci/dockertests.sh nerdctl
        env:
          CDXGEN_DEBUG_MODE: debug
  os-tests:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: pnpm install, build and test
        run: |
          pnpm install:frozen
          mkdir -p bomresults
        env:
          CI: true
      - name: ostests
        run: |
          bin/cdxgen.js -t os -o bomresults/bom-os.json --fail-on-error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: matrix.os == 'ubuntu-24.04-arm'
        with:
          name: bomresults-os
          path: bomresults

  win-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: pnpm install, build
        run: |
          pnpm install:frozen
          mkdir bomresults
        env:
          CI: true
      - name: wintests
        run: |
          node bin/cdxgen.js -t os -o bomresults/bom-win.json --fail-on-error
          dir bomresults
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: bomresults-win
          path: bomresults

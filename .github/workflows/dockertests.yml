name: docker tests

on:
  pull_request:
    paths:
      - '.github/workflows/dockertests.yml'
      - '.nvmrc'
      - '.pnpmfile.cjs'
      - 'bin/**'
      - 'data/**'
      - 'index.cjs'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '!**.poku.js'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  linux-tests:
    strategy:
      fail-fast: true
      matrix:
        os: ['ubuntu-24.04', 'ubuntu-24.04-arm']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p bomresults
        env:
          CI: true
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-dockertests
      - name: dockertests
        if: matrix.os == 'ubuntu-24.04'
        run: |
          assert_container_audit_bom() {
            jq -e '[.annotations[]? | select((.text // "") | contains("cdx:audit:category | container-risk |"))] | length > 0' "$1" >/dev/null || {
              echo "Expected container-risk audit findings in $1"
              return 1
            }
            jq -e '[.components[]? | select((.properties // []) | any((.name == "cdx:gtfobins:matched" or .name == "cdx:container:matched") and .value == "true"))] | length > 0' "$1" >/dev/null || {
              echo "Expected GTFOBins or container-risk enrichment properties in $1"
              return 1
            }
          }
          bin/cdxgen.js ubuntu:latest -p -t docker -o bomresults/bom-ubuntu.json --fail-on-error
          bin/cdxgen.js ubuntu:latest -p -t docker -o bomresults/bom-ubuntu-audit.json --bom-audit --bom-audit-categories container-risk --fail-on-error
          assert_container_audit_bom bomresults/bom-ubuntu-audit.json
          docker rmi ubuntu:latest
          bin/cdxgen.js alpine:latest -p -t docker -o bomresults/bom-alpine.json --fail-on-error
          bin/cdxgen.js alpine:latest -p -t docker -o bomresults/bom-alpine-audit.json --bom-audit --bom-audit-categories container-risk --fail-on-error
          assert_container_audit_bom bomresults/bom-alpine-audit.json
          docker rmi alpine:latest
          bin/cdxgen.js almalinux:9.4-minimal -p -t docker -o bomresults/bom-almalinux.json --fail-on-error
          docker rmi almalinux:9.4-minimal
          bin/cdxgen.js phpmyadmin@sha256:1092481630056189e43cc0fe66fd01defcc9334d78ab4611b22f65e9a39869bd -p -o bomresults/bom-phpmyadmin.json --fail-on-error
          docker rmi phpmyadmin@sha256:1092481630056189e43cc0fe66fd01defcc9334d78ab4611b22f65e9a39869bd
          bin/cdxgen.js shiftleft/scan-slim -o bomresults/bom-scanslim.json -p -t container --fail-on-error
          docker rmi shiftleft/scan-slim
          bin/cdxgen.js redmine@sha256:a5c5f8a64a0d9a436a0a6941bc3fb156be0c89996add834fe33b66ebeed2439e -p -o bomresults/bom-redmine.json --fail-on-error
          docker rmi redmine@sha256:a5c5f8a64a0d9a436a0a6941bc3fb156be0c89996add834fe33b66ebeed2439e
          bin/cdxgen.js rocket.chat@sha256:379f7afa0e67497c363ac9a9b3e7e6a6d31deee228233307c987e4a0c68b28e6 -p -o bomresults/bom-rocket.json --fail-on-error
          docker rmi rocket.chat@sha256:379f7afa0e67497c363ac9a9b3e7e6a6d31deee228233307c987e4a0c68b28e6
          bin/cdxgen.js sonarqube@sha256:7c0edcb99c964984db6d24330db33bb12de1e8ae0d5974d77640b1efea1483d1 -p -o bomresults/bom-sonar.json --fail-on-error
          docker rmi sonarqube@sha256:7c0edcb99c964984db6d24330db33bb12de1e8ae0d5974d77640b1efea1483d1
          bin/cdxgen.js zookeeper@sha256:5bf00616677db5ef57d8a2da7c5dadf67f1a6be54b0c33a79be3332c9c80aeb6 -p -o bomresults/bom-zoo.json --fail-on-error
          docker rmi zookeeper@sha256:5bf00616677db5ef57d8a2da7c5dadf67f1a6be54b0c33a79be3332c9c80aeb6
          docker pull shiftleft/scan-slim:latest
          docker save shiftleft/scan-slim:latest -o /tmp/scanslim.tar
          docker rmi shiftleft/scan-slim:latest
          bin/cdxgen.js /tmp/scanslim.tar -p -o bomresults/bom-scanarch.json --fail-on-error
          rm /tmp/scanslim.tar
          ls -ltr bomresults
        env:
          CDXGEN_DEBUG_MODE: debug
      - name: dockertests arm
        run: |
          bin/cdxgen.js ubuntu:latest -p -t docker -o bomresults/bom-ubuntu.json --fail-on-error
          docker rmi ubuntu:latest
          bin/cdxgen.js alpine:latest -p -t docker -o bomresults/bom-alpine.json --fail-on-error
          docker rmi alpine:latest
          bin/cdxgen.js almalinux:9.4-minimal -p -t docker -o bomresults/bom-almalinux.json --fail-on-error
          docker rmi almalinux:9.4-minimal
          ls -ltr bomresults
        env:
          CDXGEN_DEBUG_MODE: debug
  linux-dockertar-tests:
    strategy:
      fail-fast: true
      matrix:
        os: ['ubuntu-24.04', 'ubuntu-24.04-arm']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p bomresults repotests
        env:
          CI: true
      - name: dockertests
        run: |
          assert_container_audit_bom() {
            jq -e '[.annotations[]? | select((.text // "") | contains("cdx:audit:category | container-risk |"))] | length > 0' "$1" >/dev/null || {
              echo "Expected container-risk audit findings in $1"
              return 1
            }
            jq -e '[.components[]? | select((.properties // []) | any((.name == "cdx:gtfobins:matched" or .name == "cdx:container:matched") and .value == "true"))] | length > 0' "$1" >/dev/null || {
              echo "Expected GTFOBins or container-risk enrichment properties in $1"
              return 1
            }
          }
          component_property_signature() {
            jq -S '[
              .components[]? |
              {
                bomRef: ."bom-ref",
                group,
                name,
                purl,
                properties: ((.properties // []) | sort_by(.name, .value)),
                type,
                version
              }
            ] | sort_by(.bomRef, .type, .group, .name, .version, .purl)' "$1"
          }
          assert_same_component_signature() {
            local expected actual expected_sig actual_sig
            expected="$1"
            actual="$2"
            expected_sig=$(mktemp)
            actual_sig=$(mktemp)
            component_property_signature "$expected" > "$expected_sig"
            component_property_signature "$actual" > "$actual_sig"
            if ! diff -u "$expected_sig" "$actual_sig"; then
              echo "Expected matching component/property signature between $expected and $actual"
              rm -f "$expected_sig" "$actual_sig"
              return 1
            fi
            rm -f "$expected_sig" "$actual_sig"
          }
          reconstruct_staged_rootfs() {
            local archive extracted_dir rootfs_dir
            archive="$1"
            extracted_dir="$2"
            rootfs_dir="$3"
            rm -rf "$extracted_dir" "$rootfs_dir"
            mkdir -p "$extracted_dir" "$rootfs_dir"
            tar -xf "$archive" -C "$extracted_dir"
            python - "$extracted_dir" "$rootfs_dir" <<'PY'
import json
import os
import shutil
import stat
import sys
import tarfile
from pathlib import Path, PurePosixPath

extracted_dir = Path(sys.argv[1])
rootfs_dir = Path(sys.argv[2])

EXTRACT_EXCLUDE_PATHS = (
    "etc/machine-id",
    "etc/gshadow",
    "etc/shadow",
    "etc/passwd",
    "etc/ssl/certs",
    "etc/pki/ca-trust",
    "usr/lib/systemd/",
    "usr/lib64/libdevmapper.so",
    "usr/sbin/",
    "cacerts",
    "ssl/certs",
    "logs/",
    "dev/",
    "proc/",
    "sys/",
    "usr/share/zoneinfo/",
    "usr/share/doc/",
    "usr/share/man/",
    "usr/share/icons/",
    "usr/share/i18n/",
    "var/lib/ca-certificates",
    "root/.gnupg",
    "root/.dotnet",
    "usr/share/licenses/device-mapper-libs",
)
MEDIA_EXTENSIONS = {
    ".jpg",
    ".jpeg",
    ".png",
    ".gif",
    ".bmp",
    ".tiff",
    ".ico",
    ".svg",
    ".mp3",
    ".wav",
    ".mp4",
    ".avi",
    ".mov",
    ".ttf",
    ".woff",
    ".woff2",
    ".eot",
}
SKIP_TYPES = {
    tarfile.BLKTYPE,
    tarfile.CHRTYPE,
    tarfile.FIFOTYPE,
    tarfile.LNKTYPE,
    tarfile.SYMTYPE,
}

def normalize_name(name):
    return str(PurePosixPath(name.lstrip("./")))

def to_rootfs_path(name):
    normalized = normalize_name(name)
    if not normalized or normalized == ".":
        return rootfs_dir
    return rootfs_dir / normalized

def remove_path(path):
    if path.is_symlink() or path.is_file():
        path.unlink(missing_ok=True)
    elif path.is_dir():
        shutil.rmtree(path, ignore_errors=True)

def apply_whiteout(member_name):
    normalized = normalize_name(member_name)
    if not normalized:
        return False
    basename = PurePosixPath(normalized).name
    if basename == ".wh..wh..opq":
        opaque_dir = to_rootfs_path(str(PurePosixPath(normalized).parent))
        if opaque_dir.is_dir():
            for child in opaque_dir.iterdir():
                remove_path(child)
        return True
    if basename.startswith(".wh."):
        whiteout_target = PurePosixPath(normalized).parent / basename[4:]
        remove_path(to_rootfs_path(str(whiteout_target)))
        return True
    return False

def should_skip(member):
    normalized = normalize_name(member.name)
    basename = PurePosixPath(normalized).name
    if basename.startswith(".wh."):
        return True
    if PurePosixPath(normalized).suffix.lower() in MEDIA_EXTENSIONS:
        return True
    if any(excluded in normalized for excluded in EXTRACT_EXCLUDE_PATHS):
        return True
    if member.type in SKIP_TYPES:
        return True
    return not (member.isdir() or member.isreg())

manifest = json.loads((extracted_dir / "manifest.json").read_text())
for layer in manifest[0]["Layers"]:
    with tarfile.open(extracted_dir / layer) as layer_tar:
        members = layer_tar.getmembers()
        for member in members:
            apply_whiteout(member.name)
        for member in members:
            if should_skip(member):
                continue
            destination = to_rootfs_path(member.name)
            if member.isdir():
                destination.mkdir(parents=True, exist_ok=True)
                continue
            destination.parent.mkdir(parents=True, exist_ok=True)
            source = layer_tar.extractfile(member)
            if source is None:
                continue
            with source, destination.open("wb") as output_file:
                shutil.copyfileobj(source, output_file)
            os.chmod(destination, stat.S_IMODE(member.mode))
PY
          }
          docker pull ubuntu:latest
          docker save -o /tmp/ubuntu.tar ubuntu:latest
          docker rmi ubuntu:latest
          bin/cdxgen.js /tmp/ubuntu.tar -p -t docker -o bomresults/bom-ubuntu.tar.json --fail-on-error
          bin/cdxgen.js /tmp/ubuntu.tar -p -t docker -o bomresults/bom-ubuntu.tar-audit.json --bom-audit --bom-audit-categories container-risk --fail-on-error
          assert_container_audit_bom bomresults/bom-ubuntu.tar-audit.json
          reconstruct_staged_rootfs /tmp/ubuntu.tar /tmp/ubuntu-archive /tmp/ubuntu-rootfs
          bin/cdxgen.js /tmp/ubuntu-rootfs -p -t rootfs -o bomresults/bom-ubuntu.rootfs.json --fail-on-error
          assert_same_component_signature bomresults/bom-ubuntu.tar.json bomresults/bom-ubuntu.rootfs.json
          docker pull alpine:latest
          docker save -o /tmp/alpine.tar alpine:latest
          docker rmi alpine:latest
          bin/cdxgen.js /tmp/alpine.tar -p -t docker -o bomresults/bom-alpine.tar.json --fail-on-error
          bin/cdxgen.js /tmp/alpine.tar -p -t docker -o bomresults/bom-alpine.tar-audit.json --bom-audit --bom-audit-categories container-risk --fail-on-error
          assert_container_audit_bom bomresults/bom-alpine.tar-audit.json
          reconstruct_staged_rootfs /tmp/alpine.tar /tmp/alpine-archive /tmp/alpine-rootfs
          bin/cdxgen.js /tmp/alpine-rootfs -p -t rootfs -o bomresults/bom-alpine.rootfs.json --fail-on-error
          assert_same_component_signature bomresults/bom-alpine.tar.json bomresults/bom-alpine.rootfs.json
          rm -rf /tmp/ubuntu-archive /tmp/ubuntu-rootfs /tmp/alpine-archive /tmp/alpine-rootfs
          ls -ltr bomresults
        env:
          CDXGEN_DEBUG_MODE: debug
  linux-podman-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p bomresults
        env:
          CI: true
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-podmantests
      - name: podmantests
        run: |
          assert_container_audit_bom() {
            jq -e '[.annotations[]? | select((.text // "") | contains("cdx:audit:category | container-risk |"))] | length > 0' "$1" >/dev/null || {
              echo "Expected container-risk audit findings in $1"
              return 1
            }
            jq -e '[.components[]? | select((.properties // []) | any((.name == "cdx:gtfobins:matched" or .name == "cdx:container:matched") and .value == "true"))] | length > 0' "$1" >/dev/null || {
              echo "Expected GTFOBins or container-risk enrichment properties in $1"
              return 1
            }
          }
          container_audit_signature() {
            jq -c '{
              containerRiskAnnotations: [.annotations[]? | select((.text // "") | contains("cdx:audit:category | container-risk |"))] | length,
              enrichedComponents: [.components[]? | select((.properties // []) | any((.name == "cdx:gtfobins:matched" or .name == "cdx:container:matched") and .value == "true"))] | length
            }' "$1"
          }
          assert_same_container_audit_signature() {
            local expected actual
            expected=$(container_audit_signature "$1")
            actual=$(container_audit_signature "$2")
            if [ "$expected" != "$actual" ]; then
              echo "Expected matching container audit signature between $1 and $2"
              echo "expected=$expected"
              echo "actual=$actual"
              return 1
            fi
          }
          if ! command -v podman >/dev/null 2>&1; then
            echo "Podman is not installed on this runner. Skipping podman coverage."
            exit 0
          fi
          docker pull alpine:latest
          bin/cdxgen.js alpine:latest -p -t docker -o bomresults/bom-docker-alpine-audit.json --bom-audit --bom-audit-categories container-risk --fail-on-error
          assert_container_audit_bom bomresults/bom-docker-alpine-audit.json
          docker save -o /tmp/docker-alpine.tar alpine:latest
          docker rmi alpine:latest
          bin/cdxgen.js /tmp/docker-alpine.tar -p -t docker -o bomresults/bom-docker-alpine-tar-audit.json --bom-audit --bom-audit-categories container-risk --fail-on-error
          assert_container_audit_bom bomresults/bom-docker-alpine-tar-audit.json
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
          mkdir -p "$XDG_RUNTIME_DIR/podman"
          podman system service -t 0 "unix://$XDG_RUNTIME_DIR/podman/podman.sock" >/tmp/podman-service.log 2>&1 &
          for _ in $(seq 1 10); do
            if [ -S "$XDG_RUNTIME_DIR/podman/podman.sock" ]; then
              break
            fi
            sleep 1
          done
          if [ ! -S "$XDG_RUNTIME_DIR/podman/podman.sock" ]; then
            echo "Podman socket is unavailable. Skipping podman coverage."
            cat /tmp/podman-service.log || true
            exit 0
          fi
          export DOCKER_HOST="unix://$XDG_RUNTIME_DIR/podman/podman.sock"
          podman pull docker.io/library/alpine:latest
          bin/cdxgen.js docker.io/library/alpine:latest -p -t docker -o bomresults/bom-podman-alpine.json --fail-on-error
          bin/cdxgen.js docker.io/library/alpine:latest -p -t docker -o bomresults/bom-podman-alpine-audit.json --bom-audit --bom-audit-categories container-risk --fail-on-error
          assert_container_audit_bom bomresults/bom-podman-alpine-audit.json
          assert_same_container_audit_signature bomresults/bom-docker-alpine-audit.json bomresults/bom-podman-alpine-audit.json
          podman save -q --format docker-archive -o /tmp/podman-docker-archive.tar docker.io/library/alpine:latest
          bin/cdxgen.js /tmp/podman-docker-archive.tar -p -t docker -o bomresults/bom-podman-docker-archive.json --fail-on-error
          bin/cdxgen.js /tmp/podman-docker-archive.tar -p -t docker -o bomresults/bom-podman-docker-archive-audit.json --bom-audit --bom-audit-categories container-risk --fail-on-error
          assert_container_audit_bom bomresults/bom-podman-docker-archive-audit.json
          assert_same_container_audit_signature bomresults/bom-docker-alpine-tar-audit.json bomresults/bom-podman-docker-archive-audit.json
          podman save -q --format oci-archive -o /tmp/podman-oci-archive.tar docker.io/library/alpine:latest
          podman rmi docker.io/library/alpine:latest
          bin/cdxgen.js /tmp/podman-oci-archive.tar -p -t docker -o bomresults/bom-podman-oci-archive.json --fail-on-error
          bin/cdxgen.js /tmp/podman-oci-archive.tar -p -t docker -o bomresults/bom-podman-oci-archive-audit.json --bom-audit --bom-audit-categories container-risk --fail-on-error
          assert_container_audit_bom bomresults/bom-podman-oci-archive-audit.json
          assert_same_container_audit_signature bomresults/bom-docker-alpine-tar-audit.json bomresults/bom-podman-oci-archive-audit.json
          rm -f /tmp/docker-alpine.tar /tmp/podman-docker-archive.tar /tmp/podman-oci-archive.tar
          ls -ltr bomresults
        env:
          CDXGEN_DEBUG_MODE: debug
  linux-nerdctl-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p bomresults
        env:
          CI: true
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-nerdctltests
      - name: nerdctltests
        run: |
          assert_container_audit_bom() {
            jq -e '[.annotations[]? | select((.text // "") | contains("cdx:audit:category | container-risk |"))] | length > 0' "$1" >/dev/null || {
              echo "Expected container-risk audit findings in $1"
              return 1
            }
            jq -e '[.components[]? | select((.properties // []) | any((.name == "cdx:gtfobins:matched" or .name == "cdx:container:matched") and .value == "true"))] | length > 0' "$1" >/dev/null || {
              echo "Expected GTFOBins or container-risk enrichment properties in $1"
              return 1
            }
          }
          container_audit_signature() {
            jq -c '{
              containerRiskAnnotations: [.annotations[]? | select((.text // "") | contains("cdx:audit:category | container-risk |"))] | length,
              enrichedComponents: [.components[]? | select((.properties // []) | any((.name == "cdx:gtfobins:matched" or .name == "cdx:container:matched") and .value == "true"))] | length
            }' "$1"
          }
          assert_same_container_audit_signature() {
            local expected actual
            expected=$(container_audit_signature "$1")
            actual=$(container_audit_signature "$2")
            if [ "$expected" != "$actual" ]; then
              echo "Expected matching container audit signature between $1 and $2"
